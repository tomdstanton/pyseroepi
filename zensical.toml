site_name = "🦠💉🌍 seroepi"
site_description = "A Python library for bacterial sero-epidemiology"
site_url = "https://tomdstanton.github.io/seroepi/"
repo_url = "https://github.com/tomdstanton/seroepi"
repo_name = "tomdstanton/seroepi"
site_author = "Tom Stanton"

nav = [
    { "Home" = "index.md" },
    { "API Reference" = "api.md" }
]

extra_javascript = [
    "javascripts/mathjax.js",
    "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
]

[theme]
name = "material"
icon = { repo = "fontawesome/brands/github" }
features = [
    "navigation.tabs",
    "navigation.sections",
    "navigation.expand",
    "navigation.top",          # Added: Back-to-top button
    "toc.integrate",           # Added: Merges TOC into the left sidebar
    "search.suggest",          # Added: Smarter search
    "search.highlight",        # Added: Highlights search terms
    "content.code.copy"
]

# Light Mode (Default)
[[theme.palette]]
scheme = "default"
primary = "indigo"
accent = "deep purple"
[theme.palette.toggle]
icon = "material/brightness-7"
name = "Switch to dark mode"

# Dark Mode (Slate)
[[theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "deep purple"
[theme.palette.toggle]
icon = "material/brightness-4"
name = "Switch to light mode"

[theme.font]
text = "Roboto"
code = "JetBrains Mono"

[markdown_extensions]
admonition = {}
"pymdownx.details" = {}
"pymdownx.superfences" = {}
"pymdownx.tabbed" = { alternate_style = true }
"pymdownx.highlight" = { anchor_linenums = true, use_pygments = true }
"pymdownx.inlinehilite" = {}
"pymdownx.arithmatex" = { generic = true }

[plugins]
search = {}

[plugins.mkdocstrings.handlers.python]
paths = ["src"]

# Added: Global styling for the auto-generated API docs
[plugins.mkdocstrings.handlers.python.options]
show_root_heading = true
show_source = true
heading_level = 2
show_signature_annotations = true
separate_signature = true
